<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Partners, Help Me Invest</title>
  <link rel="icon" type="image/png" href="logos/hmi-mark.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>window.__BASE = '';</script>
  <script type="text/babel" src="js/components.jsx"></script>

  <script type="text/babel">


function PaymentStep({ numeral, eyebrow, figure, title, children }) {
  return (
    <div className="payment-step">
      <div className="payment-step-head">
        <p className="payment-step-numeral">{numeral}</p>
        <p className="payment-step-eyebrow">{eyebrow}</p>
      </div>
      {figure && <p className="payment-step-figure">{figure}</p>}
      <h3 className="payment-step-title">{title}</h3>
      <div className="payment-step-detail">{children}</div>
    </div>);

}

function Standard({ headline, children }) {
  return (
    <div>
          <h3 className="h3">{headline}</h3>
          <p className="body" style={{ marginTop: 12, maxWidth: 640 }}>{children}</p>
        </div>);

}

function PartnerCard({ name, role, bio }) {
  return (
    <article className="stack-md">
          <Placeholder ratio="4x5" label="[ Partner portrait ]" />
          <div className="stack-sm">
            <h4 className="h4">{name}</h4>
            <p className="body-small" style={{ fontWeight: 500, color: 'var(--charcoal)' }}>
              {role}
            </p>
            <p className="body" style={{ marginTop: 8 }}>{bio}</p>
          </div>
        </article>);

}

function Partners() {
  return (
    <React.Fragment>
          <Header active="partners" />

          <main>
            {/* Header */}
            <section className="shell" style={{ paddingTop: 64, paddingBottom: 96 }}>
              <h1 className="d1 col-display">The partners we <em>vouch for.</em></h1>
              <p className="body-large col-body" style={{ marginTop: 32 }}>Our partners are introduced to you on merit, paid in arrangements that are documented openly, and held to the outcome you’re working toward. They stand alongside, not in front. You lead the engagement; the partner brings the specific help.



          </p>
              <Placeholder ratio="16x9" label="[ Cover image ]" style={{ marginTop: 56 }} />
            </section>

            {/* Standards (same card layout as the home page "What we do") */}
            <section className="shell section">
              <p className="section-eyebrow">What we ask</p>
              <h2 className="h1 col-display">
                What we ask of <em>every partner.</em>
              </h2>
              <p className="body-large col-body" style={{ marginTop: 32 }}>
                Three standards. Every partner meets all of them, or they don&rsquo;t carry
                the vouch.
              </p>

              <div className="whatwedo-grid whatwedo-grid--carded" style={{ gridTemplateColumns: '1fr 1fr 1fr' }}>
                <div className="whatwedo-card whatwedo-card--filled">
                  <h3 className="whatwedo-card-headline">They <em>earn</em> the introduction.</h3>
                  <p className="whatwedo-card-body">
                    Every partner is vetted on the substance of the work, not on what they&rsquo;re
                    willing to pay for placement. The criteria we use to vouch for them are
                    published, and the same criteria apply to every partner, regardless of
                    who they are or what they bring to the platform.
                  </p>
                </div>
                <div className="whatwedo-card whatwedo-card--filled">
                  <h3 className="whatwedo-card-headline">They stand <em>alongside,</em> not in front.</h3>
                  <p className="whatwedo-card-body">
                    The customer leads the engagement. The partner brings the specific help and
                    the technical work. They do not gatekeep information, they do not steer
                    toward outcomes that suit them.
                  </p>
                </div>
                <div className="whatwedo-card whatwedo-card--filled">
                  <h3 className="whatwedo-card-headline">They are <em>accountable</em> to the outcome.</h3>
                  <p className="whatwedo-card-body">
                    If a partner falls short, you can raise it with us in writing. We investigate,
                    we resolve, and where the criteria are no longer met, the partner stops being
                    a partner. We are not a directory.
                  </p>
                </div>
              </div>
            </section>

            {/* The partners (placeholder cards) */}
            <section className="shell section">
              <h2 className="h2 col-display">Who we <em>vouch for.</em></h2>
              <p className="body col-body" style={{ marginTop: 20 }}>
                Placeholder copy. Replace with a short editorial intro once the partner roster is
                confirmed.
              </p>
              <div className="grid-3" style={{ marginTop: 56 }}>
                {[1, 2, 3].map((i) =>
            <a key={i} className="partner-card stack-md" href={withBase('partners/partner-bio.html')}>
                    <Placeholder ratio="4x5" label="[ Partner portrait ]" />
                    <div className="stack-sm">
                      <h4 className="h4">Partner name placeholder.</h4>
                      <p className="body-small" style={{ fontWeight: 500, color: 'var(--charcoal)' }}>
                        What this partner does for the customer, placeholder line.
                      </p>
                      <p className="body" style={{ marginTop: 8 }}>
                        Placeholder editorial bio. Two or three sentences about the partner, written
                        in the same register as the rest of the page. Replace with real copy once the
                        partner is confirmed and onboarded.
                      </p>
                      <p className="partner-card-cta">Read the full bio <Arrow /></p>
                    </div>
                  </a>
            )}
              </div>
            </section>

            {/* Closing */}
            <section className="shell" style={{ paddingTop: 96, paddingBottom: 160 }}>
              <div className="col-body stack-md">
                <h2 className="h2">Our partners are here <em>when you&rsquo;re ready.</em></h2>
                <p className="body">Learn at your own pace. Decide in your own time. When you’d like specific help with a decision, tell us what you’re working on and we’ll introduce you to the right expert.




            </p>
                <p style={{ marginTop: 28 }}>
                  <TertiaryLink to="find-an-expert.html">Talk to an expert <Arrow /></TertiaryLink>
                </p>
              </div>
            </section>
          </main>

          <Footer />
        </React.Fragment>);

}

ReactDOM.createRoot(document.getElementById('root')).render(<Partners />);
</script>
</body>
</html>
