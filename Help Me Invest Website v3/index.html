<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Help Me Invest, Property investing on your own terms.</title>
  <link rel="icon" type="image/png" href="logos/hmi-mark.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>window.__BASE = '';</script>
  <script type="text/babel" src="js/components.jsx"></script>

  <script type="text/babel">

    /* Editorial-portrait. Defaults to a Lighter Mint placeholder
       with a Warm Mid-Grey label; if `src` is passed, renders the real
       image filling the frame. */
    function EditorialPortrait({ src, alt, focus, zoom }) {
      if (src) {
        return (
          <div className="editorial-portrait has-image">
            <img src={withBase(src)} alt={alt || ''} style={{
              objectPosition: focus || '50% 50%',
              transform: zoom ? `scale(${zoom})` : 'scale(1.25)',
            }} />
          </div>
        );
      }
      return (
        <div className="editorial-portrait">
          <span className="editorial-portrait-label">[ Editorial portrait ]</span>
        </div>
      );
    }

    function InvestorProfile({ name, age, city, decision, href, image, focus, zoom }) {
      return (
        <a className="investor-profile" href={withBase(href)}>
          <EditorialPortrait src={image} focus={focus} zoom={zoom}
                             alt={image ? `Portrait of ${name}` : null} />
          <p className="investor-meta">{name} &middot; {age} &middot; {city}</p>
          <p className="investor-decision">{decision}</p>
          <p className="investor-cta">Read {name}&rsquo;s story <Arrow /></p>
        </a>
      );
    }

    function SectionEyebrow({ children }) {
      return <p className="section-eyebrow">{children}</p>;
    }

    function Home() {
      const chainLayers = [
        { label: 'Placeholder.', clip: true,  description: 'Placeholder copy. Replace with a plain-English description of what happens at this layer and where the clip is taken.' },
        { label: 'Placeholder.', clip: false, description: 'Placeholder copy. Replace with a plain-English description of what happens at this layer.' },
        { label: 'Placeholder.', clip: true,  description: 'Placeholder copy. Replace with a plain-English description of what happens at this layer and where the clip is taken.' },
        { label: 'Placeholder.', clip: true,  description: 'Placeholder copy. Replace with a plain-English description of what happens at this layer and where the clip is taken.' },
        { label: 'Placeholder.', clip: false, description: 'Placeholder copy. Replace with a plain-English description of what happens at this layer.' },
      ];

      return (
        <React.Fragment>
          <Header active="home" />

          <main>

            {/* Hero (contained photographic banner, rounded corners) */}
            <section className="hero-card-wrap">
              <div className="hero-card">
                <img className="hero-card-img"
                     src={withBase('images/hero-banner.png')}
                     alt="An Australian property investor reviewing learning material at home, quiet, considered, on their own terms." />
                <div className="hero-card-content">
                  <h1 className="hero-card-headline">
                    Property investing<br />
                    on your own terms
                  </h1>
                  <p className="hero-card-lede">
                    A platform for Australians investing on their own terms. Learn how property
                    investing actually works, get direct access to the deals that used to flow only
                    through closed channels, and call on the experts you can trust, when
                    you&rsquo;re ready.
                  </p>
                  <div className="hero-card-ctas">
                    <a className="hero-card-cta hero-card-cta--primary"
                       href={withBase('self-assessment.html')}>
                      Start building my property strategy <Arrow />
                    </a>
                    <a className="hero-card-cta hero-card-cta--ghost"
                       href={withBase('how-it-works.html')}>
                      How it works <Arrow />
                    </a>
                  </div>
                </div>
              </div>
            </section>

            {/* The Problem */}
            <section className="shell section">
              <SectionEyebrow>The problem</SectionEyebrow>

              <h2 className="h1 col-display">
                There&rsquo;s a chain between you and the property you&rsquo;re trying to buy.{' '}
                <em>Each layer takes a clip.</em>
              </h2>

              {/* Diagrams sit directly below the headline */}
              <div className="grid-2" style={{ marginTop: 64, alignItems: 'start' }}>
                <ChainDiagram
                  title="The chain you can&rsquo;t see."
                  topLabel="The property"
                  layers={chainLayers}
                  caption="A structural sketch. Each circle marks a layer where a clip is taken."
                />
                <PlatformDiagram
                  title="The way Help Me Invest works."
                  topLabel="The property"
                  caption="Knowledge moves directly. The customer leads the decision."
                />
              </div>

              {/* Below the diagrams: the structural critique. */}
              <div className="col-body" style={{ marginTop: 96 }}>
                <div className="stack-md">
                  <p className="body">
                    Australian property investing has evolved into a layered system. The property
                    sits at one end of it. The everyday investor sits at the other. Between them
                    sit the layers, each one claiming to bring the buyer closer to the
                    deal, each one taking a fee for doing so.
                  </p>
                  <p className="body">
                    The architecture quietly rewards keeping the buyer in the dark. The more
                    confused the buyer, the more valuable the intermediary. The more complex the
                    process, the more fees can be charged for navigating it.
                  </p>
                </div>
                <p style={{ marginTop: 32 }}>
                  <span className="tertiary-link">Learn more about the chain <Arrow /></span>
                </p>
              </div>
            </section>

            {/* What we do */}
            <section className="shell section">
              <SectionEyebrow>What we do</SectionEyebrow>
              <h2 className="h1 col-display">
                Three things, <em>delivered directly,</em> at a fraction of what the chain has charged.
              </h2>
              <p className="body-large col-body" style={{ marginTop: 32 }}>
                The platform gives everyday Australians the knowledge, the access, and the
                trusted experts to invest in property themselves. Each one was previously gated.
                None of them needs to be.
              </p>

              <div className="whatwedo-grid whatwedo-grid--carded">
                <a className="whatwedo-card whatwedo-card--filled" href={withBase('education.html')}>
                  <span className="whatwedo-card-number">01</span>
                  <h3 className="whatwedo-card-headline">The teaching is <em>open.</em></h3>
                  <p className="whatwedo-card-body">
                    Every part of the property investing journey, from first principles to
                    finance, structure, selection, and execution, taught openly. No paywall
                    on the fundamentals.
                  </p>
                  <p className="whatwedo-card-link">
                    See the modules <Arrow />
                  </p>
                </a>
                <a className="whatwedo-card whatwedo-card--filled" href={withBase('education/wholesale.html')}>
                  <span className="whatwedo-card-number">02</span>
                  <h3 className="whatwedo-card-headline">The access is <em>direct.</em></h3>
                  <p className="whatwedo-card-body">
                    Wholesale stock, off-market deals, and insider opportunities that have
                    historically flowed only through closed channels, available without
                    paying for layers in between.
                  </p>
                  <p className="whatwedo-card-link">
                    How the access works <Arrow />
                  </p>
                </a>
                <a className="whatwedo-card whatwedo-card--filled" href={withBase('partners.html')}>
                  <span className="whatwedo-card-number">03</span>
                  <h3 className="whatwedo-card-headline">The help is <em>yours to call.</em></h3>
                  <p className="whatwedo-card-body">
                    Trusted partners chosen on merit, aligned with your outcome. Always there in
                    your corner if you need them.
                  </p>
                  <p className="whatwedo-card-link">
                    Meet the partners <Arrow />
                  </p>
                </a>
              </div>
              <p style={{ marginTop: 48 }}>
                <TertiaryLink to="how-it-works.html">Learn how it works <Arrow /></TertiaryLink>
              </p>
            </section>

            {/* Your starting point: the self-assessment */}
            <section className="bg-mint" style={{ padding: '96px 0' }}>
              <div className="shell">
                <div className="grid-2" style={{ gap: 72, alignItems: 'center' }}>
                  <div>
                    <SectionEyebrow>Your starting point</SectionEyebrow>
                    <h2 className="h1">Now, see where you <em>really stand.</em></h2>
                    <p className="body-large" style={{ marginTop: 32 }}>
                      You can see the whole chain now, and how much of it ran on keeping you
                      in the dark about your own position. This is where that ends. The
                      self-assessment is a predictive model that shows you where you stand today,
                      where you want to be by the time you retire, and the strategy it takes to
                      close the gap. The first move on a property plan that&rsquo;s genuinely your
                      own.
                    </p>
                    <div style={{ marginTop: 48, display: 'flex', alignItems: 'center', gap: 32, flexWrap: 'wrap' }}>
                      <a className="btn btn-primary" href={withBase('self-assessment.html')}>Start my self assessment <Arrow /></a>
                      <TertiaryLink to="how-it-works.html">See how it works <Arrow /></TertiaryLink>
                    </div>
                  </div>
                  <Placeholder ratio="1x1" label="[ Self-assessment preview ]" />
                </div>
              </div>
            </section>

            {/* Investor stories */}
            <section className="shell section">
              <SectionEyebrow>Investor stories</SectionEyebrow>
              <div className="col-display">
                <h2 className="h1">Australians investing on their own terms, <em>in their own words.</em></h2>
                <p className="body-large col-body" style={{ marginTop: 32 }}>
                  What unites them isn&rsquo;t the stage they&rsquo;re at, it&rsquo;s their
                  values. They want to understand a decision before they make it. They expect
                  transparency by default. They treat property as a decision, not as a dream.
                </p>
              </div>

              <div className="investor-triptych" style={{ marginTop: 80 }}>
                <InvestorProfile
                  name="Aisha"
                  age="26"
                  city="outer Melbourne"
                  decision="Bought her first investment property directly through the platform."
                  href="stories/investor-story.html"
                  image="images/aisha.png"
                />
                <InvestorProfile
                  name="Marcus"
                  age="38"
                  city="Newcastle"
                  decision="Refinanced, then bought a second property, with every fee on the page."
                  href="stories/investor-story.html"
                  image="images/marcus.png"
                  focus="80% 50%"
                />
                <InvestorProfile
                  name="Chris"
                  age="51"
                  city="regional Queensland"
                  decision="Fourth property, stress-tested with a platform partner before signing."
                  href="stories/investor-story.html"
                  image="images/chris.png"
                  focus="50% 40%"
                  zoom="1.2"
                />
              </div>

              <p style={{ marginTop: 64 }}>
                <TertiaryLink to="success-stories.html">See all investor stories <Arrow /></TertiaryLink>
              </p>
            </section>

            {/* Closing CTA */}
            <section className="shell" style={{ paddingTop: 120, paddingBottom: 160, textAlign: 'center' }}>
              <h2 className="d1" style={{ maxWidth: 900, margin: '0 auto' }}>
                Property investing <em>back in the hands</em><br />of everyday Australians.
              </h2>
              <p className="body-large" style={{ maxWidth: 520, margin: '32px auto 0' }}>
                The education is free. The access is open. The choice is yours.
              </p>
              <div style={{ marginTop: 48, display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 32, flexWrap: 'wrap' }}>
                <PrimaryButton to="education/wholesale.html">Start building my property strategy <Arrow /></PrimaryButton>
                <TertiaryLink to="how-it-works.html">How it works <Arrow /></TertiaryLink>
              </div>
            </section>
          </main>

          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Home />);
  </script>
</body>
</html>
