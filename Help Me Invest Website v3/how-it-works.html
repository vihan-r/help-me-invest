<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>How it works, Help Me Invest</title>
  <link rel="icon" type="image/png" href="logos/hmi-mark.png" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* How-it-works: phase rhythm + fee callouts */
    .phase {
      padding: 120px 0;
      border-top: 1px solid rgba(139, 136, 129, 0.4);
    }
    .phase:first-of-type { border-top: none; padding-top: 56px; }
    .phase-grid {
      display: grid;
      grid-template-columns: 360px minmax(0, 1fr);
      gap: 80px;
      align-items: start;
    }
    @media (max-width: 980px) {
      .phase-grid { grid-template-columns: 1fr; gap: 40px; }
      .phase { padding: 80px 0; }
    }

    /* High-level journey diagram: Self assess → Learn → Execute,
       with Seek help as the optional in-between step. */
    .journey {
      display: flex;
      align-items: stretch;
      margin-top: 8px;
    }
    .journey-step {
      flex: 1 1 0;
      min-width: 0;
      background: var(--emerald);
      border-radius: 16px;
      padding: 26px 26px 28px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .journey-step--optional {
      background: var(--paper);
      border: 1px dashed rgba(10, 75, 52, 0.45);
    }
    .journey-step--optional .journey-label { color: var(--emerald); }
    .journey-step--optional .journey-sub { color: var(--charcoal); }
    .journey-eyebrow {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--emerald);
      font-weight: 500;
      margin: 0;
    }
    .journey-label {
      font-family: 'Newsreader', Georgia, serif;
      font-weight: 400;
      font-variation-settings: 'opsz' 36;
      font-size: 27px;
      line-height: 1.05;
      letter-spacing: -0.02em;
      color: var(--paper);
      margin: 0;
    }
    .journey-sub {
      font-size: 14px;
      line-height: 1.45;
      color: var(--paper);
      margin: 0;
    }
    .journey-arrow {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px;
      color: var(--emerald);
      font-size: 22px;
      line-height: 1;
    }
    @media (max-width: 820px) {
      .journey { flex-direction: column; }
      .journey-arrow { transform: rotate(90deg); padding: 8px 0; align-self: center; }
    }

    /* Meta column, a Lighter Mint panel anchored by a giant italic
       phase number. Bigger, more visually present than before. */
    .phase-meta {
      background: var(--lighter-mint);
      border-radius: 20px;
      padding: 36px 32px;
    }
    .phase-numeral {
      font-family: 'Newsreader', Georgia, serif;
      font-weight: 400;
      font-style: italic;
      font-variation-settings: 'opsz' 72;
      font-size: 88px;
      line-height: 0.9;
      letter-spacing: -0.03em;
      color: var(--emerald);
      margin: 0;
    }
    .phase-tag {
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--emerald);
      font-weight: 500;
      margin: 16px 0 0;
    }
    .phase-divider {
      height: 1px;
      background: rgba(10, 75, 52, 0.25);
      margin: 24px 0;
      border: none;
    }
    .phase-cost {
      font-family: 'Newsreader', Georgia, serif;
      font-variation-settings: 'opsz' 36;
      font-weight: 400;
      font-size: 28px;
      line-height: 1.15;
      color: var(--emerald);
      letter-spacing: -0.015em;
      margin: 0;
    }
    .phase-cost-sub {
      margin-top: 12px;
      font-size: 15px;
      color: var(--charcoal);
      line-height: 1.5;
    }

    .phase-body .phase-headline {
      font-family: 'Newsreader', Georgia, serif;
      font-weight: 400;
      font-variation-settings: 'opsz' 72;
      font-size: clamp(34px, 3.6vw, 50px);
      line-height: 1.08;
      letter-spacing: -0.022em;
      color: var(--emerald);
      margin: 0;
      text-wrap: balance;
    }
    .phase-body .phase-lede {
      font-size: 19px;
      line-height: 1.55;
      color: var(--charcoal);
      margin: 24px 0 0;
      max-width: 640px;
    }

    .phase-steps {
      list-style: none;
      counter-reset: step;
      padding: 0;
      margin: 40px 0 0;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 720px;
    }
    .phase-steps li {
      position: relative;
      padding-left: 48px;
      counter-increment: step;
    }
    .phase-steps li::before {
      content: counter(step, decimal-leading-zero);
      position: absolute;
      left: 0;
      top: 2px;
      font-family: 'Newsreader', Georgia, serif;
      font-style: italic;
      font-size: 16px;
      color: var(--grey);
      font-weight: 400;
    }
    .phase-steps p {
      margin: 0;
      font-size: 16px;
      line-height: 1.6;
      color: var(--charcoal);
    }

    /* Fee callout, Mint panel, used inside Phase 3. */
    .fee-callouts {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin: 48px 0 0;
      max-width: 720px;
    }
    @media (max-width: 720px) { .fee-callouts { grid-template-columns: 1fr; } }
    .fee-callout {
      background: var(--mint);
      border-radius: 20px;
      padding: 28px;
      color: var(--emerald);
    }
    .fee-callout-figure {
      font-family: 'Newsreader', Georgia, serif;
      font-weight: 400;
      font-variation-settings: 'opsz' 72;
      font-size: 40px;
      line-height: 1;
      letter-spacing: -0.025em;
      margin: 0;
    }
    .fee-callout-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--emerald);
      margin: 12px 0 0;
      opacity: 0.7;
    }
    .fee-callout-body {
      font-size: 14px;
      line-height: 1.55;
      color: var(--charcoal);
      margin: 16px 0 0;
    }

    /* Engagement fee card, no fill, just type and a thin Emerald
       left border. The fee is named, not packaged. */
    .fee-card {
      margin: 48px 0 0;
      padding: 8px 0 8px 28px;
      border-left: 2px solid var(--emerald);
      max-width: 640px;
    }
    .fee-card-figure {
      font-family: 'Newsreader', Georgia, serif;
      font-weight: 400;
      font-variation-settings: 'opsz' 72;
      font-size: 56px;
      line-height: 1;
      letter-spacing: -0.025em;
      color: var(--emerald);
      margin: 0;
    }
    .fee-card-label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--grey);
      margin: 12px 0 0;
    }
    .fee-card-body {
      font-size: 16px;
      line-height: 1.6;
      color: var(--charcoal);
      margin: 16px 0 0;
    }

    /* Comparison section ("Through the chain. Through HMI."), 
       Two equal columns. Left (chain) on Soft Paper with a thin grey
       border. Right (HMI) on Lighter Mint, no border. Each fee row is
       label + body + serif figure right-aligned. */
    .compare-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
      margin-top: 80px;
      align-items: stretch;
    }
    @media (max-width: 880px) {
      .compare-grid { grid-template-columns: 1fr; gap: 24px; }
    }
    .compare-col {
      padding: 40px;
      border-radius: 24px;
      display: flex;
      flex-direction: column;
    }
    .compare-col--chain {
      background: var(--paper);
      border: 1px solid rgba(139, 136, 129, 0.55);
    }
    .compare-col--hmi {
      background: var(--lighter-mint);
    }
    .compare-label {
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--grey);
      font-weight: 500;
      margin: 0;
    }
    .compare-h {
      font-family: 'Newsreader', Georgia, serif;
      font-weight: 400;
      font-variation-settings: 'opsz' 36;
      font-size: 30px;
      line-height: 1.15;
      letter-spacing: -0.02em;
      color: var(--emerald);
      margin: 16px 0 0;
    }
    .compare-scenario {
      font-size: 15px;
      line-height: 1.5;
      color: var(--charcoal);
      margin: 16px 0 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid rgba(139, 136, 129, 0.4);
    }
    .compare-col--hmi .compare-scenario {
      border-bottom-color: rgba(10, 75, 52, 0.2);
    }

    .compare-fees {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
    }
    .compare-fee {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24px;
      align-items: baseline;
      padding: 24px 0;
      border-bottom: 1px solid rgba(139, 136, 129, 0.4);
    }
    .compare-col--hmi .compare-fee {
      border-bottom-color: rgba(10, 75, 52, 0.2);
    }
    .compare-fee:last-child { border-bottom: none; }
    .compare-fee-tag {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      font-weight: 500;
      margin: 0;
    }
    .tag-hidden  { color: var(--grey); }
    .tag-visible { color: var(--emerald); }
    .compare-fee-name {
      font-weight: 500;
      font-size: 16px;
      color: var(--charcoal);
      margin: 8px 0 0;
    }
    .compare-fee-note {
      font-size: 14px;
      line-height: 1.5;
      color: var(--grey);
      margin: 6px 0 0;
      max-width: 360px;
    }
    .compare-fee-figure {
      font-family: 'Newsreader', Georgia, serif;
      font-weight: 400;
      font-variation-settings: 'opsz' 36;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -0.02em;
      color: var(--emerald);
      text-align: right;
      font-variant-numeric: tabular-nums;
      margin: 0;
      white-space: nowrap;
    }
    .compare-fee-figure.is-undisclosed {
      font-size: 18px;
      font-style: italic;
      color: var(--grey);
    }

    .compare-totals {
      margin-top: auto;
      padding-top: 32px;
    }
    .compare-total {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: baseline;
    }
    .compare-total + .compare-total {
      margin-top: 12px;
      padding-top: 20px;
      border-top: 1px solid rgba(139, 136, 129, 0.4);
    }
    .compare-col--hmi .compare-total + .compare-total {
      border-top-color: rgba(10, 75, 52, 0.2);
    }
    .compare-total-label {
      font-size: 13px;
      letter-spacing: 0.04em;
      color: var(--grey);
      font-weight: 500;
      margin: 0;
    }
    .compare-total .compare-total-label--final {
      color: var(--charcoal);
      font-size: 15px;
      letter-spacing: 0;
    }
    .compare-total-fig {
      font-family: 'Newsreader', Georgia, serif;
      font-weight: 400;
      font-variation-settings: 'opsz' 72;
      font-size: 28px;
      line-height: 1;
      letter-spacing: -0.025em;
      color: var(--grey);
      margin: 0;
      font-variant-numeric: tabular-nums;
    }
    .compare-total-fig--final {
      color: var(--emerald);
      font-size: 44px;
    }

    .compare-footnote {
      margin: 48px 0 0;
      font-size: 12px;
      line-height: 1.6;
      color: var(--grey);
      max-width: 880px;
    }

    /* The pull-line that names the brand posture in each phase. */
    .phase-aside {
      margin: 40px 0 0;
      padding: 20px 0 20px 24px;
      border-left: 2px solid var(--emerald);
      font-family: 'Newsreader', Georgia, serif;
      font-weight: 400;
      font-variation-settings: 'opsz' 36;
      font-size: 22px;
      line-height: 1.3;
      color: var(--emerald);
      max-width: 640px;
      letter-spacing: -0.005em;
    }

    /* The exit reminder strip, recurs between phases. */
    .exit-line {
      max-width: 720px;
      margin: 32px 0 0;
      font-size: 14px;
      color: var(--grey);
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <script type="text/babel">
