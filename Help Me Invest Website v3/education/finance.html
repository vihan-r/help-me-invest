<!doctype html>
<html lang="en-AU">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Finance, Help Me Invest</title>
  <link rel="icon" type="image/png" href="../logos/hmi-mark.png" />
  <link rel="stylesheet" href="../styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script>window.__BASE = '../';</script>
  <script type="text/babel" src="../js/components.jsx"></script>

  <script type="text/babel">
    function Finance() {
      // Locked modules, generic placeholders. Specifics don't matter because
      // the cards are blurred and non-interactive until the user has an account.
      const lockedModules = [
        { duration: '13:24', title: 'How lenders assess you.', desc: 'What a bank really looks at when it decides how much you can borrow.' },
        { duration: '10:48', title: 'Loan structures that compound.', desc: 'Why the way a loan is set up matters as much as the rate.' },
        { duration: '15:32', title: 'Interest only versus P&I.', desc: 'When each makes sense, and what it does to cash flow and risk.' },
        { duration: '11:15', title: 'Offset and redraw.', desc: 'Two tools that cut interest without locking your money away.' },
        { duration: '08:40', title: 'Fixed versus variable.', desc: 'Choosing certainty or flexibility, and how to split the difference.' },
        { duration: '12:18', title: 'Lenders mortgage insurance.', desc: 'What LMI costs, when it is worth paying, and how to avoid it.' },
        { duration: '09:55', title: 'Using your equity.', desc: 'How equity in one property funds the deposit on the next.' },
        { duration: '14:05', title: 'Trail commissions explained.', desc: 'What your broker is, and is not, paid to tell you.' },
        { duration: '07:30', title: 'When refinancing pays off.', desc: 'The moment switching loans is worth it, and the traps to watch.' },
      ];

      const authed = !!(window.HMIAuth && window.HMIAuth.isLoggedIn());

      return (
        <React.Fragment>
          <Header active="education" />

          <main>
            {/* Header */}
            <section className="shell" style={{ paddingTop: 64, paddingBottom: 32 }}>
              <Eyebrow>Education &middot; Finance</Eyebrow>
              <h1 className="d1 col-display" style={{ marginTop: 16 }}>
                The financing decisions that <em>compound.</em>
              </h1>
              <p className="body-large col-body" style={{ marginTop: 32 }}>
                Start here. One short module that lays out how property is actually financed in
                Australia, the products, the fees, the trail commissions, and the small
                number of decisions that compound over the life of a loan. The rest of the series
                builds on this one.
              </p>
            </section>

            {/* Module 01 hero video */}
            <section className="shell" style={{ paddingTop: 32, paddingBottom: 32 }}>
              <div style={{ maxWidth: 900 }}>
                <div className="hero-video" role="button" tabIndex="0" aria-label="Play Module 01, The financing decisions that compound">
                  <div className="video-play" aria-hidden="true">
                    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M4 2.5v11l10-5.5z" /></svg>
                  </div>
                  <span className="hero-video-badge">Module 01 &middot; 09:10</span>
                </div>
                <div className="hero-video-row">
                  <SecondaryButton to="account/create.html">Watch next module <Arrow /></SecondaryButton>
                </div>
              </div>
            </section>

            {/* Divider */}
            <section className="shell" style={{ paddingTop: 64, paddingBottom: 64 }}>
              <hr className="rule" style={{ maxWidth: 900 }} />
            </section>

            {/* The rest of the series */}
            <section className="shell" style={{ paddingBottom: 96 }}>
              <Eyebrow>The rest of the series</Eyebrow>
              <h2 className="h2 col-display" style={{ marginTop: 12 }}>
                {authed ? <>The full series, <em>yours to watch.</em></> : <>Free to watch. <em>Create an account to continue.</em></>}
              </h2>
              <p className="body col-body" style={{ marginTop: 20 }}>
                {authed
                  ? <>You&rsquo;re signed in, so the whole library is open to you. Watch in any order, whenever you want it.</>
                  : <>The account is free and exists to serve you, a place to keep what you&rsquo;re learning, and to introduce you to the partners you can call on when you&rsquo;re ready. The teaching itself was never the thing we were going to charge for.</>}
              </p>

              <div className="locked-zone" style={{ marginTop: 40 }}>
                <div className="locked-modules" aria-hidden="true">
                  {lockedModules.map((m, i) => (
                    <VideoModule
                      key={i}
                      index={i + 2}
                      title="Module title placeholder."
                      duration={m.duration}
                      blurb="A short description of the module goes here."
                      href={withBase('education/module.html') + '?topic=' + encodeURIComponent('Finance') + '&from=finance.html&n=' + (i + 2) + '&d=' + encodeURIComponent(m.duration)}
                    />
                  ))}
                </div>

                <div className="locked-cta">
                  <p className="eyebrow">Free account &middot; 30 seconds</p>
                  <h3 className="h3">Create your account <em>to keep going.</em></h3>
                  <p className="locked-cta-body">
                    We&rsquo;ll save where you are. You can stop any time.
                  </p>
                  <a className="btn btn-primary" href={withBase('account/create.html')}>
                    Create my account <Arrow />
                  </a>
                  <a className="locked-cta-signin" href={withBase('account/sign-in.html')}>
                    Already have an account? Sign in <Arrow />
                  </a>
                </div>
              </div>
            </section>

            {/* Article footer nav */}
            <section className="shell" style={{ paddingTop: 40, paddingBottom: 120 }}>
              <div style={{ maxWidth: 900 }}>
                <div className="article-nav">
                  <a href={withBase('education/wholesale.html')}>&larr; Previous: Wholesale</a>
                  <a href={withBase('education.html')}>Back to Education</a>
                  <a href={withBase('education/strategy.html')}>Next: Property strategy &rarr;</a>
                </div>
              </div>
            </section>
          </main>

          <Footer />
        </React.Fragment>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<Finance />);
  </script>
</body>
</html>
